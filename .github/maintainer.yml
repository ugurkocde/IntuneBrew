# Maintainer config for IntuneBrew
# https://github.com/ugurkocde/Maintainer

triage:
  enabled: true
  auto_label: true
  auto_dedupe: true

fix:
  enabled: true
  # When triage classifies an issue as fixable (scoped + bug + reproducible),
  # attempt a fix automatically and open a draft pull request.
  auto_attempt: true
  # Sonnet is roughly one-fifth the cost of Opus and good enough for
  # scoped bugs. Switch to claude-opus-4-7 if fix quality drops.
  model: claude-sonnet-4-6

commands:
  enabled: true
  # Strict allowlist: only ugurkocde can trigger /maintainer or @maintainer.
  allowed_users: [ugurkocde]

stale:
  enabled: true
  days_until_stale: 90
  days_until_close: 14
  exempt_labels: [pinned, security, enhancement]
